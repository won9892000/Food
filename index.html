<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지? 🍽️</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <div id="app">

    <!-- Home Screen -->
    <div id="screen-home" class="screen">
      <div class="home-header">
        <div class="home-character">🍽️</div>
        <h1 class="home-title">오늘 뭐 먹지?</h1>
        <p class="home-subtitle">간단한 질문으로 딱 맞는 메뉴 추천!</p>
      </div>
      <div class="home-actions">
        <button id="btn-start" class="primary-btn">추천 시작하기 🚀</button>
        <button id="btn-history" class="secondary-btn">히스토리 📋</button>
      </div>
    </div>

    <!-- Question Screen -->
    <div id="screen-question" class="screen">
      <div class="question-header">
        <div id="q-character" class="q-character">😊</div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="q-progress" class="q-progress-text"></div>
      </div>
      <div class="q-bubble">
        <div id="q-text" class="q-text"></div>
      </div>
      <div id="q-options" class="q-options"></div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
      <div class="result-header">
        <div class="result-character">😋</div>
        <div id="result-reason" class="result-reason"></div>
      </div>
      <div id="result-cards"></div>
      <div class="result-actions">
        <button id="btn-retry" class="secondary-btn">전부 다시 추천 🔄</button>
        <button id="btn-back-home" class="secondary-btn">홈으로 🏠</button>
      </div>
    </div>

    <!-- History Screen -->
    <div id="screen-history" class="screen">
      <div class="history-header">
        <button id="btn-history-back" class="btn-back">←</button>
        <h2>먹은 기록 📋</h2>
      </div>
      <div id="history-list"></div>
    </div>

  </div>

  <script src="js/foods.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/recommend.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
